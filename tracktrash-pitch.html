<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TrackTrash — Pitch Deck</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0f172a;color:#fff;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(5,150,105,.15),transparent 50%),
                   radial-gradient(ellipse at 80% 20%,rgba(2,132,199,.1),transparent 50%)}
.logo{width:280px;border-radius:16px;margin-bottom:32px;
  box-shadow:0 20px 60px rgba(0,0,0,.5)}
h1{font-size:2.5rem;font-weight:900;letter-spacing:-.05em;margin-bottom:8px;text-align:center}
h1 span{color:#10b981}
.sub{color:#94a3b8;font-size:1rem;margin-bottom:40px;text-align:center}
.badge{display:inline-block;background:rgba(5,150,105,.2);color:#10b981;
  font-size:.7rem;font-weight:700;padding:4px 12px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.1em;border:1px solid rgba(5,150,105,.3);
  margin-bottom:32px}
.cta{display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,#059669,#10b981);color:#fff;
  font-size:1rem;font-weight:800;padding:16px 32px;border-radius:14px;
  text-decoration:none;box-shadow:0 8px 30px rgba(5,150,105,.4);
  transition:transform .2s,box-shadow .2s;margin-bottom:20px}
.cta:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(5,150,105,.5)}
.secondary{display:inline-block;color:#64748b;font-size:.8rem;text-decoration:none;
  margin-top:8px}
.secondary:hover{color:#94a3b8}
.team-num{color:#475569;font-size:.8rem;margin-top:48px;font-weight:600}
</style>
</head>
<body>
  <img src="public/assets/logo-tracktrash.jpg" alt="TrackTrash Logo" class="logo"/>
  <div class="badge">🏆 Equipe #338 — Hackathon 2026</div>
  <h1>Track<span>Trash</span></h1>
  <p class="sub">Logística Reversa Inteligente para Resíduos Eletrônicos</p>
  <a href="https://manus.im/share/file/99471a60-f13f-45b7-b593-f0b20a7fd61a" target="_blank" class="cta">
    🎤 Ver Pitch Deck Completo →
  </a>
  <br/>
  <a href="https://tracktrash-pitch.vercel.app" target="_blank" style="display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);color:#94a3b8;font-size:.9rem;font-weight:600;padding:12px 24px;border-radius:10px;text-decoration:none;border:1px solid rgba(255,255,255,.1);margin-top:12px;">
    🚀 Acessar Plataforma ao Vivo
  </a>
  <p class="team-num">Anna · Jasmyne · Léo · Lucas · Otto</p>
</body>
</html>
